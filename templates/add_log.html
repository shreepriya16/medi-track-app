{% extends "base.html" %}
{% block content %}
<h2>Add Maintenance Log</h2>
<form method="POST">
  Date: <input type="date" name="maintenance_date"><br>
  Technician: <input type="text" name="technician_name"><br>
  Issue: <textarea name="issue_reported"></textarea><br>
  Resolution: <textarea name="resolution_notes"></textarea><br>
  Next Due: <input type="date" name="next_due_date"><br>
  <button type="submit">Add Log</button>
</form>
{% endblock %}
