<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MediTrack</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body{
            background:#f4f8fb;
        }

        .navbar{
            background:#0d6efd;
        }

        .navbar-brand{
            font-size:24px;
            font-weight:bold;
        }

        .card{
            border:none;
            border-radius:15px;
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
            box-shadow:0px 10px 25px rgba(0,0,0,0.15);
        }

        .footer{
            margin-top:50px;
            text-align:center;
            padding:20px;
            color:gray;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow">
    <div class="container">

        <a class="navbar-brand" href="/">
            <i class="fa-solid fa-hospital"></i>
            MediTrack
        </a>

        <div>
            <a class="btn btn-light me-2" href="{{ url_for('index') }}">
                Home
            </a>

            <a class="btn btn-success me-2" href="{{ url_for('add_equipment') }}">
                Add Equipment
            </a>

            <a class="btn btn-warning" href="{{ url_for('dashboard') }}">
                Dashboard
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">

{% block content %}
{% endblock %}

</div>

<div class="footer">
    © 2026 MediTrack Hospital Equipment Management System
</div>

</body>
</html>
